<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>AQL Inspection Tracker Pro</title>
  <link id="manifest-placeholder" rel="manifest" href="">
  <meta name="theme-color" content="#2196F3">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
  <style>
    :root {
      --md-sys-color-primary: #2196F3;
      --md-sys-color-on-primary: #FFFFFF;
      --md-sys-color-surface: #F8F9FA;
      --md-sys-color-surface-variant: #FFFFFF;
      --md-sys-color-outline: #E0E0E0;
      --md-text-primary: #1A1C1E;
      --md-text-secondary: #43474E;
      --md-text-tertiary: #73777F;
      --color-danger: #BA1A1A;
      --color-danger-bg: #FFDAD7;
      --color-success: #006D44;
      --color-success-bg: #D4EAD6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--md-sys-color-surface); font-family: sans-serif; color: var(--md-text-primary); padding: 16px; display: flex; justify-content: center; }
    .app { width: 100%; max-width: 440px; }
    .hdr { display: flex; align-items: flex-start; justify-content: space-between; padding: 8px 4px 20px; }
    .hdr-main { display: flex; align-items: center; gap: 14px; }
    .hdr-icon { width: 44px; height: 44px; border-radius: 12px; background: var(--md-sys-color-primary); display: flex; align-items: center; justify-content: center; color: white; }
    .version { font-size: 10px; color: var(--md-text-tertiary); font-weight: 700; }
    .card { background: var(--md-sys-color-surface-variant); border: 1px solid var(--md-sys-color-outline); border-radius: 16px; margin-bottom: 16px; overflow: hidden; }
    .card-hdr { padding: 14px 16px; border-bottom: 1px solid var(--md-sys-color-outline); font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--md-text-secondary); }
    .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; padding: 16px; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .input-group { display: flex; flex-direction: column; gap: 6px; }
    .input-group label { font-size: 12px; font-weight: 600; color: var(--md-text-secondary); }
    .form-control { width: 100%; font-size: 14px; padding: 10px 12px; background: #F1F3F5; border: 1px solid transparent; border-radius: 10px; }
    .sod-grid { display: grid; grid-template-columns: repeat(3, 1fr); border-bottom: 1px solid var(--md-sys-color-outline); }
    .sod-cell { padding: 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 8px; border-right: 1px solid var(--md-sys-color-outline); }
    .sod-label { font-size: 10px; font-weight: 700; text-transform: uppercase; color: var(--md-text-tertiary); }
    .sod-stepper { display: flex; align-items: center; gap: 4px; }
    .sod-stepper button { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; }
    .sod-stepper input { width: 30px; text-align: center; border: none; font-weight: 700; background: transparent; }
    .metrics { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--md-sys-color-outline); display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .met { background: #F1F3F5; border-radius: 12px; padding: 12px; text-align: center; }
    .met-val { font-size: 18px; font-weight: 700; color: var(--md-sys-color-primary); }
    .met-lbl { font-size: 10px; font-weight: 700; color: var(--md-text-tertiary); }
    .status-banner { padding: 12px; text-align: center; font-weight: 600; border-radius: 12px; margin-top: 10px; }
    .btn-submit { width: 100%; background: var(--md-sys-color-primary); color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; }
    .db-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .db-table th { background: #F1F3F5; padding: 8px; text-align: left; }
    .db-table td { padding: 8px; border-bottom: 1px solid var(--md-sys-color-outline); }
  </style>
</head>
<body>

<div class="app">
  <header class="hdr">
    <div class="hdr-main">
      <div class="hdr-icon"><i class="ti ti-database"></i></div>
      <div class="hdr-text"><h1>AQL Tracker</h1></div>
    </div>
    <div class="version">v1.0.0</div>
  </header>

  <section class="card">
    <div class="card-hdr">Parâmetros de Qualidade</div>
    <div class="sod-grid">
      <div class="sod-cell"><span class="sod-label">Sev</span><div class="sod-stepper"><button onclick="step('sev',-1)">-</button><input type="number" id="sev" value="5" readonly><button onclick="step('sev',1)">+</button></div></div>
      <div class="sod-cell"><span class="sod-label">Occ</span><div class="sod-stepper"><button onclick="step('occ',-1)">-</button><input type="number" id="occ" value="3" readonly><button onclick="step('occ',1)">+</button></div></div>
      <div class="sod-cell" style="border-right:none"><span class="sod-label">Det</span><div class="sod-stepper"><button onclick="step('det',-1)">-</button><input type="number" id="det" value="3" readonly><button onclick="step('det',1)">+</button></div></div>
    </div>
    <div class="form-grid">
      <div class="form-row-2">
        <div class="input-group"><label>Lote</label><input type="number" class="form-control" id="lot" value="2000" oninput="calc()"></div>
        <div class="input-group"><label>Histórico</label><select class="form-control" id="hist" onchange="calc()"><option value="Normal">Normal</option><option value="Minor">Minor</option><option value="Major">Major</option></select></div>
      </div>
    </div>
  </section>

  <section class="card" id="result-card">
    <div class="card-hdr">Plano AQL</div>
    <div style="padding:16px;">
      <div id="cat-pill" style="font-weight:700; margin-bottom:10px;"></div>
      <div class="metrics" id="metrics" style="display:none;">
        <div class="met"><div class="met-val" id="n-val">-</div><div class="met-lbl">Amostra (n)</div></div>
        <div class="met"><div class="met-val" id="c-val">-</div><div class="met-lbl">Rejeição (c)</div></div>
      </div>
    </div>
  </section>

  <section class="card" id="triagem-card" style="display:none;">
    <div class="card-hdr">Triagem</div>
    <div class="form-grid">
      <div class="input-group"><label>Total Inspecionado</label><input type="number" class="form-control" id="total-insp" value="0" oninput="validar()"></div>
      <div class="input-group"><label>Total Rejeitado</label><input type="number" class="form-control" id="total-rej" value="0" oninput="validar()"></div>
      <div id="status-banner" class="status-banner">Aguardando...</div>
      <button class="btn-submit" onclick="salvar()">Salvar Registro</button>
    </div>
  </section>

  <section class="card">
    <div class="card-hdr">Histórico</div>
    <table class="db-table"><tbody id="db-rows"></tbody></table>
  </section>
</div>

<script>
  const DB = [
    {min: 1, s: 32, n: 32, r25: 2, r15: 1, r10: 1},
    {min: 200, s: 50, n: 50, r25: 3, r15: 2, r10: 1},
    {min: 500, s: 80, n: 80, r25: 4, r15: 3, r10: 2},
    {min: 1200, s: 125, n: 125, r25: 6, r15: 4, r10: 3},
    {min: 3200, s: 200, n: 200, r25: 8, r15: 6, r10: 4}
  ];

  let limite = 0;

  function step(id, d) { let el = document.getElementById(id); el.value = Math.max(1, Math.min(10, parseInt(el.value) + d)); calc(); }

  function calc() {
    const s = +document.getElementById('sev').value, o = +document.getElementById('occ').value, det = +document.getElementById('det').value;
    const lot = +document.getElementById('lot').value, hist = document.getElementById('hist').value;
    const rpn = s * o * det;
    const cat = rpn >= 50 || s === 10 ? 'A' : (rpn < 36 ? 'C' : 'B');
    
    document.getElementById('cat-pill').innerText = `Categoria ${cat}`;
    const met = document.getElementById('metrics'), triagem = document.getElementById('triagem-card');

    if (cat === 'B') {
      const row = DB.slice().reverse().find(x => lot >= x.min) || DB[0];
      limite = (hist === 'Normal' ? row.r25 : (hist === 'Minor' ? row.r15 : row.r10));
      document.getElementById('n-val').innerText = row.n;
      document.getElementById('c-val').innerText = limite;
      met.style.display = 'grid'; triagem.style.display = 'block';
      document.getElementById('total-insp').value = row.n;
    } else {
      met.style.display = 'none'; triagem.style.display = 'none';
    }
    validar();
  }

  function validar() {
    const rej = +document.getElementById('total-rej').value;
    const b = document.getElementById('status-banner');
    b.innerText = rej >= limite ? '❌ REJEITADO' : '✅ ACEITE';
    b.style.background = rej >= limite ? 'var(--color-danger-bg)' : 'var(--color-success-bg)';
  }

  function salvar() {
    let db = JSON.parse(localStorage.getItem('db') || '[]');
    db.push({ insp: document.getElementById('total-insp').value, rej: document.getElementById('total-rej').value });
    localStorage.setItem('db', JSON.stringify(db));
    carregar();
  }

  function carregar() {
    const db = JSON.parse(localStorage.getItem('db') || '[]');
    document.getElementById('db-rows').innerHTML = db.map(i => `<tr><td>Inspecionados: ${i.insp}</td><td>Rejeitados: ${i.rej}</td></tr>`).join('');
  }

  calc(); carregar();
</script>
</body>
</html>
